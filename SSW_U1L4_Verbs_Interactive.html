<style>

body{font-family:'Open Sans',sans-serif;background:#f0f4f8;color:#1A1A2E;min-height:100vh;display:flex;flex-direction:column}

.phase-learn{background:#D7ECF0;color:#3A7D8C}

p,.desc{font-family:'Poppins',sans-serif;font-size:1.05rem;line-height:1.6;margin-bottom:12px;color:#1A1A2E}

.card-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin:20px 0}
.card{background:#fff;border:2px solid #D7ECF0;border-radius:12px;padding:20px;text-align:center;transition:all .2s}
.card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.08)}
.card-icon{font-size:2rem;margin-bottom:8px}

.check-btn:hover{background:#d15a4d}

.sort-area{display:flex;gap:20px;margin:20px 0;flex-wrap:wrap}

.word-chip{font-family:'Poppins',sans-serif;font-size:.95rem;padding:9px 14px;background:#fff;border:2px solid #D7ECF0;border-radius:8px;margin:5px 0;cursor:grab;transition:all .2s;user-select:none;text-align:center}
.word-chip:hover{border-color:#3A7D8C;background:#EBF5F8}
.word-chip.correct-place{border-color:#3A7D8C;background:#D7ECF0;cursor:default}
.word-chip.wrong-place{border-color:#E66B5D;background:#FDF0EE;animation:shake .4s}

.sentence-finder{margin:20px 0}
.sf-toolbar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.pen-btn{font-family:'Poppins',sans-serif;font-size:.9rem;padding:8px 18px;border:2px solid #D7ECF0;border-radius:8px;cursor:pointer;background:#fff;transition:all .2s}

.review-card{border-radius:12px;padding:24px;cursor:pointer;transition:all .3s;min-height:120px;display:flex;align-items:center;justify-content:center;text-align:center;font-family:'Poppins',sans-serif}

.review-card .answer{display:none;font-size:.95rem;line-height:1.5}

.review-card.flipped .answer{display:block}
.rc-teal{background:#D7ECF0;color:#3A7D8C;border:2px solid #3A7D8C}

.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:16px;margin:24px auto;max-width:500px}
.stat-card{background:#EBF5F8;border-radius:12px;padding:20px;text-align:center}

.restart-btn{font-family:'Open Sans',sans-serif;font-weight:700;font-size:1rem;padding:14px 36px;border:2px solid #3A7D8C;border-radius:10px;cursor:pointer;background:#fff;color:#3A7D8C;margin-top:24px;transition:all .2s}

@media(max-width:700px){.slide{padding:28px 20px}h1{font-size:1.5rem}h2{font-size:1.25rem}.concept-big{font-size:3rem}.sort-area{flex-direction:column}.sort-cols{flex-direction:column}.card-grid{grid-template-columns:1fr 1fr}}
@media(max-width:500px){.card-grid{grid-template-columns:1fr}.review-grid{grid-template-columns:1fr}}

<body>

<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
<div class="star-counter" id="starCounter"><span class="star-icon">⭐</span> <span id="starNum">0</span></div>
<div class="slide-container" id="slideContainer"></div>
<div class="nav-bar">
  <button class="nav-btn prev" id="prevBtn" onclick="nav(-1)">← Back</button>
  <span class="slide-num" id="slideNum"></span>
  <button class="nav-btn next" id="nextBtn" onclick="nav(1)">Next →</button>
</div>

<script>
// ═══ LESSON DATA ═══
const L = {
  unit: 1, lesson: 4,
  title: "Verbs – Action Words",
  subtitle: "What Do Nouns DO?",
  goal: "I can identify verbs and understand that every sentence needs an action word.",

  review: {
    question: "Which word is a <strong>proper noun</strong>?",
    options: ["city", "Texas", "school", "river"],
    correct: 1,
    rightMsg: "✓ Correct! Texas is a proper noun – it names a SPECIFIC place and starts with a capital letter.",
    wrongMsg: "✗ Not quite. Texas is the proper noun – it names a SPECIFIC place."
  },

  categories: [
    { icon: "🏃", title: "Physical Actions", examples: "run, jump, kick, throw, dance, clap" },
    { icon: "🗣️", title: "Speaking Actions", examples: "say, shout, whisper, talk, yell, ask" },
    { icon: "🧠", title: "Thinking Actions", examples: "think, know, understand, remember, believe" },
    { icon: "❤️", title: "Feeling Actions", examples: "love, hate, like, fear, enjoy" },
  ],

  quickCheck: {
    question: 'Which word is a <strong>verb</strong> in this sentence?<br>"The cat <u>jumped</u> on the table."',
    options: ["cat", "jumped", "table", "the"],
    correct: 1,
    rightMsg: "✓ Yes! 'Jumped' is the verb – it's the action word telling what the cat DID.",
    wrongMsg: "✗ The verb is 'jumped' – it tells us what the cat DID."
  },

  sortWords: [
    { word: "run", cat: "physical" },
    { word: "shout", cat: "speaking" },
    { word: "think", cat: "thinking" },
    { word: "love", cat: "feeling" },
    { word: "kick", cat: "physical" },
    { word: "whisper", cat: "speaking" },
    { word: "remember", cat: "thinking" },
    { word: "enjoy", cat: "feeling" },
    { word: "dance", cat: "physical" },
    { word: "believe", cat: "thinking" },
    { word: "yell", cat: "speaking" },
    { word: "fear", cat: "feeling" },
  ],
  sortCols: [
    { id: "physical", label: "🏃 Physical" },
    { id: "speaking", label: "🗣️ Speaking" },
    { id: "thinking", label: "🧠 Thinking" },
    { id: "feeling", label: "❤️ Feeling" },
  ],

  finderSentences: [
    { text: "The dog chased the ball.", verbs: ["chased"] },
    { text: "My sister reads and writes every day.", verbs: ["reads", "writes"] },
    { text: "Students think about the answer carefully.", verbs: ["think"] },
    { text: "The baby laughed and clapped her hands.", verbs: ["laughed", "clapped"] },
    { text: "Birds fly south in the winter.", verbs: ["fly"] },
  ],

  reviewCards: [
    { q: "What is a verb?", a: "A verb is an action word that tells what someone or something DOES.", style: "rc-teal" },
    { q: "Name the 4 types of verbs", a: "Physical, Speaking, Thinking, and Feeling actions", style: "rc-coral" },
    { q: "How do you find the verb?", a: "Ask: \"What is someone or something DOING?\" The answer is the verb!", style: "rc-yellow" },
    { q: "Can a sentence have more than one verb?", a: "Yes! If someone does two or more things, there can be multiple verbs.", style: "rc-blue" },
    { q: "Does every sentence need a verb?", a: "Yes! Every complete sentence MUST have a verb – no exceptions!", style: "rc-teal" },
  ],
};

// ═══ STATE ═══
let currentSlide = 0;
let stars = 0;
let activitiesCompleted = 0;
let totalSlides = 0;
let sortChecked = false;
let finderIdx = 0;
let finderCorrectTotal = 0;

// ═══ BUILD SLIDES ═══
function buildSlides() {
  const c = document.getElementById('slideContainer');
  c.innerHTML = '';
  let idx = 0;

  // Slide 0: Title
  c.innerHTML += `<div class="slide" data-idx="${idx++}">
    <span class="phase-label phase-learn">LEARN</span>
    <p style="font-family:Poppins;font-weight:600;color:#E66B5D;font-size:.95rem;margin-bottom:4px">UNIT ${L.unit} · LESSON ${L.lesson}</p>
    <h1>${L.title}</h1>
    <p class="subtitle">${L.subtitle}</p>
    <div class="goal-box"><strong>Today's Goal:</strong> ${L.goal}</div>
  </div>`;

  // Slide 1: Concept Intro
  c.innerHTML += `<div class="slide" data-idx="${idx++}">
    <span class="phase-label phase-learn">LEARN</span>
    <div class="concept-big">Verb</div>
    <div class="concept-sub">Action Word</div>
  </div>`;

  // Slide 2: Review (previous lesson)
  c.innerHTML += `<div class="slide" data-idx="${idx++}" id="reviewSlide">
    <span class="phase-label phase-learn">LEARN</span>
    <h2>Quick Review: Nouns</h2>
    <p>${L.review.question}</p>
    <div class="mc-options" id="reviewOpts"></div>
    <div class="feedback" id="reviewFb"></div>
  </div>`;

  // Slide 3: Rule / Concept – Verb definition + categories
  c.innerHTML += `<div class="slide" data-idx="${idx++}">
    <span class="phase-label phase-learn">LEARN</span>
    <h2>What Is a Verb?</h2>
    <p>A <strong style="color:#3A7D8C">VERB</strong> is an <strong>action word</strong>. It tells us what someone or something <strong>DOES</strong>.</p>
    <p>Every complete sentence <strong>MUST</strong> have a verb!</p>
    <h3 style="margin-top:20px">Four Types of Verbs</h3>
    <div class="card-grid">
      ${L.categories.map(c => `<div class="card"><div class="card-icon">${c.icon}</div><div class="card-title">${c.title}</div><div class="card-examples">${c.examples}</div></div>`).join('')}
    </div>
  </div>`;

  // Slide 4: Quick Check
  c.innerHTML += `<div class="slide" data-idx="${idx++}" id="qcSlide">
    <span class="phase-label phase-learn">LEARN</span>
    <h2>Quick Check</h2>
    <p>${L.quickCheck.question}</p>
    <div class="mc-options" id="qcOpts"></div>
    <div class="feedback" id="qcFb"></div>
  </div>`;

  // Slide 5: Practice – Verb Sort
  c.innerHTML += `<div class="slide" data-idx="${idx++}" id="sortSlide">
    <span class="phase-label phase-practice">PRACTICE</span>
    <h2>Verb Sort</h2>
    <p>Drag each verb into the correct category!</p>
    <div class="sort-area">
      <div class="sort-bank" id="sortBank">
        <div class="sort-bank-title">Word Bank</div>
      </div>
      <div class="sort-cols" id="sortCols"></div>
    </div>
    <button class="check-btn" id="sortCheckBtn" onclick="checkSort()">Check My Answers</button>
    <div class="feedback" id="sortFb"></div>
  </div>`;

  // Slide 6: Practice – Sentence Word Finder
  c.innerHTML += `<div class="slide" data-idx="${idx++}" id="finderSlide">
    <span class="phase-label phase-practice">PRACTICE</span>
    <h2>Find the Verb!</h2>
    <p>Click on the <strong>verb(s)</strong> in each sentence.</p>
    <div class="sf-counter" id="finderCounter"></div>
    <div class="sf-sentence" id="finderSentence"></div>
    <button class="check-btn" id="finderCheckBtn" onclick="checkFinder()">Check</button>
    <div class="feedback" id="finderFb"></div>
  </div>`;

  // Slide 7: Tricky Concepts
  c.innerHTML += `<div class="slide" data-idx="${idx++}">
    <span class="phase-label phase-learn">LEARN</span>
    <h2>Tricky Concepts</h2>
    <div style="background:#FFFDF0;border:2px solid #F3D25B;border-radius:12px;padding:20px;margin-bottom:16px">
      <h3 style="color:#9E7F0A">🤔 Not all verbs are actions you can SEE!</h3>
      <p style="font-size:.95rem">Words like <strong>think</strong>, <strong>know</strong>, <strong>love</strong>, and <strong>believe</strong> are all verbs – even though they happen inside your mind. If it's something a person DOES (even silently), it's a verb!</p>
    </div>
    <div style="background:#FFFDF0;border:2px solid #F3D25B;border-radius:12px;padding:20px;margin-bottom:16px">
      <h3 style="color:#9E7F0A">🤔 Verbs can change form!</h3>
      <p style="font-size:.95rem"><strong>walk → walked → will walk</strong><br>These are all the same verb in different tenses. They're all still verbs!</p>
    </div>
    <div style="background:#FFFDF0;border:2px solid #F3D25B;border-radius:12px;padding:20px">
      <h3 style="color:#9E7F0A">🤔 "Happy" is NOT a verb!</h3>
      <p style="font-size:.95rem">You can't DO "happy." You can <em>be</em> happy, but "happy" describes – it doesn't show action. Use the test: <strong>Is it an action? Can you DO it?</strong></p>
    </div>
  </div>`;

  // Slide 8: Review Cards
  c.innerHTML += `<div class="slide" data-idx="${idx++}">
    <span class="phase-label phase-review">REVIEW</span>
    <h2>Review – Click to Reveal!</h2>
    <div class="review-grid" id="reviewCards"></div>
  </div>`;

  // Slide 9: Celebration
  c.innerHTML += `<div class="slide" data-idx="${idx++}" id="celebSlide">
    <div class="celebration">
      <div class="trophy">🏆</div>
      <h1>Amazing Work!</h1>
      <p class="subtitle">You're a verb detective now!</p>
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-num" id="finalStars">0</div><div class="stat-label">Stars Earned</div></div>
        <div class="stat-card"><div class="stat-num" id="finalActivities">0</div><div class="stat-label">Activities Completed</div></div>
      </div>
      <button class="restart-btn" onclick="startOver()">🔄 Start Over</button>
    </div>
  </div>`;

  totalSlides = idx;
  initInteractives();
  showSlide(0);
}

// ═══ INTERACTIVE INIT ═══
function initInteractives() {
  // Review MC
  buildMC('reviewOpts', L.review.options, 'reviewFb', L.review, 'review');
  // Quick Check MC
  buildMC('qcOpts', L.quickCheck.options, 'qcFb', L.quickCheck, 'qc');
  // Sort
  buildSort();
  // Finder
  loadFinderSentence();
  // Review cards
  buildReviewCards();
}

function buildMC(containerId, options, fbId, data, prefix) {
  const container = document.getElementById(containerId);
  container.innerHTML = options.map((o, i) =>
    `<div class="mc-opt" data-idx="${i}" id="${prefix}_opt_${i}" onclick="selectMC('${prefix}',${i})">${o}</div>`
  ).join('');
  // add check button after options
  const btn = document.createElement('button');
  btn.className = 'check-btn';
  btn.id = prefix + 'CheckBtn';
  btn.textContent = 'Check';
  btn.onclick = () => checkMC(prefix, data, fbId);
  container.parentNode.insertBefore(btn, document.getElementById(fbId));
}

let mcSelections = {};
function selectMC(prefix, idx) {
  const opts = document.querySelectorAll(`#${prefix}Opts .mc-opt, [id^="${prefix}_opt_"]`);
  if (opts[0] && opts[0].classList.contains('locked')) return;
  mcSelections[prefix] = idx;
  const container = document.getElementById(prefix === 'review' ? 'reviewOpts' : 'qcOpts');
  container.querySelectorAll('.mc-opt').forEach((o, i) => {
    o.classList.toggle('selected', i === idx);
  });
}

function checkMC(prefix, data, fbId) {
  const container = document.getElementById(prefix === 'review' ? 'reviewOpts' : 'qcOpts');
  const fb = document.getElementById(fbId);
  const sel = mcSelections[prefix];
  if (sel === undefined) return;

  const opts = container.querySelectorAll('.mc-opt');
  opts.forEach(o => o.classList.add('locked'));
  document.getElementById(prefix + 'CheckBtn').disabled = true;

  if (sel === data.correct) {
    opts[sel].classList.add('correct');
    fb.className = 'feedback show correct';
    fb.innerHTML = data.rightMsg;
    addStars(1);
  } else {
    opts[sel].classList.add('incorrect');
    opts[data.correct].classList.add('correct');
    fb.className = 'feedback show incorrect';
    fb.innerHTML = data.wrongMsg;
  }
  activitiesCompleted++;
}

// ═══ SORT ═══
let draggedChip = null;
function buildSort() {
  const bank = document.getElementById('sortBank');
  const cols = document.getElementById('sortCols');

  // Shuffle words
  const shuffled = [...L.sortWords].sort(() => Math.random() - 0.5);
  shuffled.forEach((w, i) => {
    const chip = document.createElement('div');
    chip.className = 'word-chip';
    chip.textContent = w.word;
    chip.dataset.cat = w.cat;
    chip.dataset.id = i;
    chip.draggable = true;
    chip.addEventListener('dragstart', e => { draggedChip = chip; chip.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; });
    chip.addEventListener('dragend', () => { chip.classList.remove('dragging'); draggedChip = null; });
    // Touch support
    chip.addEventListener('click', () => handleChipClick(chip));
    bank.appendChild(chip);
  });

  // Columns
  L.sortCols.forEach(col => {
    const div = document.createElement('div');
    div.className = 'sort-column';
    div.id = 'col_' + col.id;
    div.innerHTML = `<h3>${col.label}</h3>`;
    div.addEventListener('dragover', e => e.preventDefault());
    div.addEventListener('drop', e => { e.preventDefault(); if (draggedChip) div.appendChild(draggedChip); });
    cols.appendChild(div);
  });

  // Bank also a drop target
  bank.addEventListener('dragover', e => e.preventDefault());
  bank.addEventListener('drop', e => { e.preventDefault(); if (draggedChip) bank.appendChild(draggedChip); });
}

let selectedChip = null;
function handleChipClick(chip) {
  if (chip.classList.contains('correct-place')) return;
  if (selectedChip === chip) { chip.style.outline = ''; selectedChip = null; return; }
  if (selectedChip) { selectedChip.style.outline = ''; }
  selectedChip = chip;
  chip.style.outline = '3px solid #3A7D8C';
}

// Click column to place selected chip
document.addEventListener('click', (e) => {
  const col = e.target.closest('.sort-column');
  if (col && selectedChip) {
    col.appendChild(selectedChip);
    selectedChip.style.outline = '';
    selectedChip = null;
  }
});

function checkSort() {
  if (sortChecked) return;
  const chips = document.querySelectorAll('.word-chip');
  let correct = 0;
  chips.forEach(chip => {
    const parent = chip.parentElement;
    if (!parent) return;
    const colId = parent.id.replace('col_', '');
    if (colId === chip.dataset.cat) {
      chip.classList.add('correct-place');
      correct++;
    } else if (parent.id.startsWith('col_')) {
      chip.classList.add('wrong-place');
      setTimeout(() => { chip.classList.remove('wrong-place'); document.getElementById('sortBank').appendChild(chip); }, 800);
    }
  });

  const fb = document.getElementById('sortFb');
  if (correct === L.sortWords.length) {
    sortChecked = true;
    fb.className = 'feedback show correct';
    fb.innerHTML = '🎉 Perfect! You sorted all the verbs correctly!';
    document.getElementById('sortCheckBtn').disabled = true;
    addStars(3);
    activitiesCompleted++;
    fireConfetti();
  } else {
    fb.className = 'feedback show incorrect';
    fb.innerHTML = `You got ${correct} out of ${L.sortWords.length} correct. The incorrect ones went back to the word bank – try again!`;
    setTimeout(() => fb.classList.remove('show'), 3000);
  }
}

// ═══ SENTENCE FINDER ═══
function loadFinderSentence() {
  if (finderIdx >= L.finderSentences.length) {
    document.getElementById('finderSentence').innerHTML = '<p style="text-align:center;color:#3A7D8C;font-weight:600;font-size:1.2rem">🎉 All sentences complete!</p>';
    document.getElementById('finderCheckBtn').style.display = 'none';
    document.getElementById('finderCounter').textContent = '';
    return;
  }
  const s = L.finderSentences[finderIdx];
  document.getElementById('finderCounter').textContent = `Sentence ${finderIdx + 1} of ${L.finderSentences.length}`;
  const words = s.text.replace(/([.,!?])/g, ' $1').split(/\s+/);
  document.getElementById('finderSentence').innerHTML = words.map((w, i) => {
    const clean = w.replace(/[.,!?]/g, '');
    return `<span class="sf-word" data-word="${clean.toLowerCase()}" onclick="toggleFinderWord(this)">${w}</span>`;
  }).join(' ');
  document.getElementById('finderCheckBtn').disabled = false;
  document.getElementById('finderCheckBtn').textContent = 'Check';
  const fb = document.getElementById('finderFb');
  fb.className = 'feedback';
}

function toggleFinderWord(el) {
  if (el.classList.contains('correct-tag') || el.classList.contains('wrong-tag')) return;
  el.classList.toggle('tagged');
  el.classList.toggle('tagged-verb');
}

function checkFinder() {
  const s = L.finderSentences[finderIdx];
  const words = document.querySelectorAll('#finderSentence .sf-word');
  let allCorrect = true;
  let tagged = 0;
  words.forEach(w => {
    const isVerb = s.verbs.includes(w.dataset.word);
    const isTagged = w.classList.contains('tagged');
    w.classList.remove('tagged-verb');
    if (isTagged && isVerb) { w.classList.add('correct-tag'); tagged++; }
    else if (isTagged && !isVerb) { w.classList.add('wrong-tag'); allCorrect = false; }
    else if (!isTagged && isVerb) { allCorrect = false; }
  });

  const fb = document.getElementById('finderFb');
  if (allCorrect && tagged === s.verbs.length) {
    fb.className = 'feedback show correct';
    fb.innerHTML = `✓ Correct! The verb${s.verbs.length > 1 ? 's are' : ' is'}: <strong>${s.verbs.join(', ')}</strong>`;
    addStars(2);
    finderCorrectTotal++;
    activitiesCompleted++;
    finderIdx++;
    setTimeout(() => { fb.classList.remove('show'); loadFinderSentence(); }, 1800);
  } else {
    fb.className = 'feedback show incorrect';
    fb.innerHTML = `Not quite – try again! Remember: ask "What is someone DOING?"`;
    // Reset wrong tags
    setTimeout(() => {
      words.forEach(w => { w.classList.remove('wrong-tag', 'tagged', 'tagged-verb'); });
      // Keep correct ones
      fb.classList.remove('show');
    }, 1500);
  }
}

// ═══ REVIEW CARDS ═══
function buildReviewCards() {
  const grid = document.getElementById('reviewCards');
  grid.innerHTML = L.reviewCards.map((c, i) =>
    `<div class="review-card ${c.style}" onclick="this.classList.toggle('flipped')">
      <div class="question">${c.q}</div>
      <div class="answer">${c.a}</div>
    </div>`
  ).join('');
}

// ═══ STARS & CONFETTI ═══
function addStars(n) {
  stars += n;
  document.getElementById('starNum').textContent = stars;
  const sc = document.getElementById('starCounter');
  sc.classList.add('pop');
  setTimeout(() => sc.classList.remove('pop'), 400);
}

function fireConfetti() {
  const colors = ['#E66B5D', '#3A7D8C', '#F3D25B', '#D7ECF0', '#ff6b9d'];
  for (let i = 0; i < 60; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.top = '-10px';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    p.style.width = (Math.random() * 8 + 6) + 'px';
    p.style.height = (Math.random() * 8 + 6) + 'px';
    p.style.animationDuration = (Math.random() * 1.5 + 1.5) + 's';
    p.style.animationDelay = (Math.random() * 0.5) + 's';
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 3000);
  }
}

// ═══ NAVIGATION ═══
function showSlide(idx) {
  document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
  const slides = document.querySelectorAll('.slide');
  if (slides[idx]) slides[idx].classList.add('active');
  currentSlide = idx;
  document.getElementById('slideNum').textContent = `${idx + 1} / ${totalSlides}`;
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').textContent = idx === totalSlides - 1 ? 'Finish' : 'Next →';
  document.getElementById('progressFill').style.width = ((idx + 1) / totalSlides * 100) + '%';

  // Celebration slide
  if (idx === totalSlides - 1) {
    document.getElementById('finalStars').textContent = stars;
    document.getElementById('finalActivities').textContent = activitiesCompleted;
    fireConfetti();
  }
}

function nav(dir) {
  const next = currentSlide + dir;
  if (next >= 0 && next < totalSlides) showSlide(next);
}

document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nav(1); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); nav(-1); }
});

function startOver() {
  stars = 0; activitiesCompleted = 0; sortChecked = false; finderIdx = 0; finderCorrectTotal = 0;
  mcSelections = {}; selectedChip = null; draggedChip = null;
  document.getElementById('starNum').textContent = '0';
  buildSlides();
}

// ═══ INIT ═══
buildSlides();
</script>
